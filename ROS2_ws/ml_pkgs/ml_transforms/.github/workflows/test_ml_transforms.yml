name: test_ml_transforms

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y python3-colcon-common-extensions python3-rosdep

      - name: Init rosdep
        run: |
          rosdep init || true
          rosdep update

      - name: Install package dependencies
        run: |
          . /opt/ros/jazzy/setup.sh
          rosdep install --from-paths ROS2_ws/ml_pkgs/ml_transforms --ignore-src -r -y

      - name: Build
        run: |
          . /opt/ros/jazzy/setup.sh
          cd ROS2_ws
          colcon build --packages-select ml_transforms

      - name: Test
        run: |
          . /opt/ros/jazzy/setup.sh
          cd ROS2_ws
          colcon test --packages-select ml_transforms
          colcon test-result --verbose
